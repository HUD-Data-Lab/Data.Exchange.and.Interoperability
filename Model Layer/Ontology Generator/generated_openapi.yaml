openapi: 3.0.3
info:
  title: Ontology API
  version: 0.1.0
paths:
  /client"s:
    get:
      summary: List Client"
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Client"'
