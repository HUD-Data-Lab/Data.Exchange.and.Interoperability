components:
  schemas:
    Client":
      type: object
      properties:
        has enrollment":
          $ref: '#/components/schemas/Enrollment"'
        NA:
          type: string
          type: string
    Enrollment":
      type: object
      properties:
        enrollment of":
          $ref: '#/components/schemas/Client"'
        has sub-enrollment":
          $ref: '#/components/schemas/Sub-Enrollment"'
        NA:
          type: string
          type: string
        member of":
          $ref: '#/components/schemas/Household"'
    Household":
      type: object
      properties:
        NA:
          type: string
          type: string
    Organization":
      type: object
      properties:
        operates":
          $ref: '#/components/schemas/Project"'
        NA:
          type: string
          type: string
    Project":
      type: object
      properties:
        has configuration":
          $ref: '#/components/schemas/Configuration"'
        has CE participation":
          $ref: '#/components/schemas/Coordinated Entry Participation"'
        has fund source":
          $ref: '#/components/schemas/Funder"'
        NA:
          type: string
          type: string
        has HMIS participation":
          $ref: '#/components/schemas/HMIS Participation"'
        operated by":
          $ref: '#/components/schemas/Organization"'
        project of":
          $ref: '#/components/schemas/Enrollment"'
    NA:
      type: object
      properties:
        NA:
          type: string
          type: string
    Sub-Enrollment":
      type: object
      properties:
        during":
          $ref: '#/components/schemas/Enrollment"'
    Configuration":
      type: object
      properties:
        configures":
          $ref: '#/components/schemas/Project"'
    Current Living Situation":
      type: object
      properties:
        NA:
          type: string
          type: string
    Assessment":
      type: object
      properties:
        NA:
          type: string
          type: string
    Service":
      type: object
      properties:
        NA:
          type: string
          type: string
    Coordinated Entry Participation":
      type: object
      properties:
        CE participation of":
          $ref: '#/components/schemas/Project"'
        NA:
          type: string
          type: string
    Funder":
      type: object
      properties:
        fund source of":
          $ref: '#/components/schemas/Project"'
        NA:
          type: string
          type: string
    HMIS Participation":
      type: object
      properties:
        HMIS participation of":
          $ref: '#/components/schemas/Project"'
        NA:
          type: string
          type: string
    Inventory":
      type: object
      properties:
        NA:
          type: string
          type: string
